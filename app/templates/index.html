<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Task Manager + K8s</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { padding-top: 2rem; }
        .task-row:hover { background-color: #f8f9fa; }
    </style>
</head>
<body>
    <div class="container">
        <h1 class="mb-4">📋 Менеджер задач</h1>

        <!-- Форма добавления -->
        <div class="card mb-4">
            <div class="card-body">
                <h5 class="card-title">Новая задача</h5>
                <div class="row g-3">
                    <div class="col-md-5">
                        <input type="text" id="taskTitle" class="form-control" placeholder="Название">
                    </div>
                    <div class="col-md-5">
                        <input type="text" id="taskDesc" class="form-control" placeholder="Описание (опционально)">
                    </div>
                    <div class="col-md-2">
                        <button id="addBtn" class="btn btn-primary w-100">➕ Добавить</button>
                    </div>
                </div>
            </div>
        </div>

        <!-- Список задач -->
        <div class="card">
            <div class="card-body">
                <h5 class="card-title">Список задач</h5>
                <div id="taskList" class="list-group">
                    <!-- Задачи будут подгружаться сюда -->
                </div>
            </div>
        </div>

        <!-- Кнопка для получения подов -->
        <div class="mt-4">
            <button id="getPodsBtn" class="btn btn-secondary">☸️ Показать поды в K8s</button>
            <div id="podsOutput" class="mt-3" style="white-space: pre-wrap; background: #f0f0f0; padding: 1rem; border-radius: 5px; display: none;"></div>
        </div>
    </div>

    <script>
        const API_BASE = '/api';

        // Загрузить все задачи
        async function loadTasks() {
            const resp = await fetch(`${API_BASE}/tasks`);
            const tasks = await resp.json();
            const container = document.getElementById('taskList');
            if (tasks.length === 0) {
                container.innerHTML = '<div class="list-group-item text-muted">Нет задач. Создайте первую!</div>';
                return;
            }
            container.innerHTML = tasks.map(task => `
                <div class="list-group-item task-row d-flex justify-content-between align-items-center">
                    <div>
                        <strong>${task.title}</strong>
                        ${task.description ? `<span class="text-muted ms-2">${task.description}</span>` : ''}
                        <span class="badge ${task.completed ? 'bg-success' : 'bg-warning'} ms-2">${task.completed ? '✅' : '⏳'}</span>
                    </div>
                    <div>
                        <button class="btn btn-sm btn-outline-danger me-1" onclick="deleteTask(${task.id})">🗑️</button>
                    </div>
                </div>
            `).join('');
        }

        // Добавить задачу
        document.getElementById('addBtn').addEventListener('click', async () => {
            const title = document.getElementById('taskTitle').value.trim();
            const description = document.getElementById('taskDesc').value.trim();
            if (!title) return alert('Название не может быть пустым');

            await fetch(`${API_BASE}/tasks`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ title, description, completed: false })
            });
            document.getElementById('taskTitle').value = '';
            document.getElementById('taskDesc').value = '';
            await loadTasks();
        });

        // Удалить задачу
        async function deleteTask(id) {
            if (!confirm('Удалить задачу?')) return;
            await fetch(`${API_BASE}/tasks/${id}`, { method: 'DELETE' });
            await loadTasks();
        }

        // Получить поды
        document.getElementById('getPodsBtn').addEventListener('click', async () => {
            const output = document.getElementById('podsOutput');
            output.style.display = 'block';
            output.textContent = 'Загрузка...';
            try {
                const resp = await fetch(`${API_BASE}/k8s/pods?namespace=default`);
                const data = await resp.json();
                if (data.pods) {
                    output.textContent = data.pods.map(p => `${p.name} — ${p.status}`).join('\n');
                } else {
                    output.textContent = JSON.stringify(data, null, 2);
                }
            } catch (e) {
                output.textContent = 'Ошибка: ' + e.message;
            }
        });

        // Инициализация
        loadTasks();
    </script>
</body>
</html>
