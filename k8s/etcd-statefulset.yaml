apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: etcd-cluster
  namespace: pet-project
  labels:
    app: etcd-cluster
spec:
  serviceName: etcd-cluster-service
  replicas: 1
  selector:
    matchLabels:
      app: etcd-cluster
  template:
    metadata:
      labels:
        app: etcd-cluster
    spec:
      containers:
      - name: etcd
        image: quay.io/coreos/etcd:v3.5.10
        env:
        - name: ETCD_NAME
          value: etcd0
        - name: ETCD_DATA_DIR
          value: /etcd-data
        - name: ETCD_LISTEN_CLIENT_URLS
          value: http://0.0.0.0:2379
        - name: ETCD_ADVERTISE_CLIENT_URLS
          value: http://$(POD_IP):2379
        - name: ETCD_LISTEN_PEER_URLS
          value: http://0.0.0.0:2380
        - name: ETCD_INITIAL_ADVERTISE_PEER_URLS
          value: http://$(POD_IP):2380
        - name: ETCD_INITIAL_CLUSTER
          value: etcd0=http://$(POD_IP):2380
        - name: ETCD_INITIAL_CLUSTER_STATE
          value: new
        - name: ETCD_INITIAL_CLUSTER_TOKEN
          value: etcd-cluster
        ports:
        - containerPort: 2379
          name: client
        - containerPort: 2380
          name: peer
        volumeMounts:
        - name: data
          mountPath: /etcd-data
        resources:
          requests:
            memory: "128Mi"
            cpu: "100m"
          limits:
            memory: "256Mi"
            cpu: "200m"
  volumeClaimTemplates:
  - metadata:
      name: data
    spec:
      accessModes: ["ReadWriteOnce"]
      resources:
        requests:
          storage: 1Gi