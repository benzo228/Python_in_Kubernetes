apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: postgres-cluster
  namespace: pet-project
  labels:
    app: postgres-cluster
spec:
  serviceName: postgres-cluster-service
  replicas: 2
  selector:
    matchLabels:
      app: postgres-cluster
  template:
    metadata:
      labels:
        app: postgres-cluster
    spec:
      containers:
      - name: postgres
        image: postgres:16-alpine
        env:
        - name: POSTGRES_PASSWORD
          valueFrom:
            secretKeyRef:
              name: postgres-secret
              key: postgres-password
        - name: POSTGRES_REPLICATION_PASSWORD
          valueFrom:
            secretKeyRef:
              name: postgres-secret
              key: replication-password
        - name: POD_IP
          valueFrom:
            fieldRef:
              fieldPath: status.podIP
        - name: POD_NAME
          valueFrom:
            fieldRef:
              fieldPath: metadata.name
        - name: PG_DATA_DIR
          value: /var/lib/postgresql/data/pgdata
        - name: PATRONI_SCOPE
          value: postgres-cluster
        - name: PATRONI_NAMESPACE
          value: /postgres-cluster
        - name: PATRONI_NAME
          value: $(POD_NAME)
        - name: PATRONI_POSTGRESQL_DATA_DIR
          value: $(PG_DATA_DIR)
        - name: PATRONI_POSTGRESQL_PGPASS
          value: /tmp/pgpass
        - name: PATRONI_RESTAPI_USERNAME
          value: patroni
        - name: PATRONI_RESTAPI_PASSWORD
          value: patroni
        - name: PATRONI_POSTGRESQL_USERNAME
          value: postgres
        - name: PATRONI_POSTGRESQL_PASSWORD
          valueFrom:
            secretKeyRef:
              name: postgres-secret
              key: postgres-password
        - name: PATRONI_POSTGRESQL_REPLICATION_USERNAME
          value: replicator
        - name: PATRONI_POSTGRESQL_REPLICATION_PASSWORD
          valueFrom:
            secretKeyRef:
              name: postgres-secret
              key: replication-password
        - name: PATRONI_ETCD_HOSTS
          value: "etcd-cluster:2379"
        - name: PATRONI_KUBERNETES_USE_ENDPOINTS
          value: "true"
        - name: PATRONI_KUBERNETES_NAMESPACE
          value: pet-project
        - name: PATRONI_KUBERNETES_LABELS
          value: app=postgres-cluster
        - name: PATRONI_POSTGRESQL_PARAMETERS
          value: |
            max_connections=100
            shared_buffers=128MB
            wal_level=replica
            max_wal_senders=10
            wal_keep_segments=32
            hot_standby=on
        ports:
        - containerPort: 5432
          name: postgres
        - containerPort: 8008
          name: patroni
        volumeMounts:
        - name: data
          mountPath: /var/lib/postgresql/data
        - name: postgres-config
          mountPath: /etc/postgresql/postgresql.conf
          subPath: postgresql.conf
        resources:
          requests:
            memory: "256Mi"
            cpu: "200m"
          limits:
            memory: "512Mi"
            cpu: "500m"
        livenessProbe:
          httpGet:
            path: /health
            port: 8008
          initialDelaySeconds: 30
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /health
            port: 8008
          initialDelaySeconds: 10
          periodSeconds: 5
      volumes:
      - name: postgres-config
        configMap:
          name: postgres-config
  volumeClaimTemplates:
  - metadata:
      name: data
    spec:
      accessModes: ["ReadWriteOnce"]
      resources:
        requests:
          storage: 1Gi