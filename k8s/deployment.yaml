apiVersion: apps/v1
kind: Deployment
metadata:
  name: task-manager
  namespace: pet-project
  labels:
    app: task-manager
spec:
  replicas: 2
  selector:
    matchLabels:
      app: task-manager
  template:
    metadata:
      labels:
        app: task-manager
    spec:
      serviceAccountName: task-manager-sa
      imagePullSecrets:
      - name: harbor-credentials
      containers:
      - name: app
        image: placeholder-task-manager:latest # заглушка, чтобы версии образов менялись
        imagePullPolicy: IfNotPresent
        ports:
        - containerPort: 8000
        env:
        - name: DATABASE_URL
          value: "postgresql+asyncpg://postgres:mysecretpassword@postgres-service.pet-project.svc.cluster.local:5432/postgres"
        - name: PORT
          value: "8000"
        resources:
          requests:
            memory: "128Mi"
            cpu: "100m"
          limits:
            memory: "256Mi"
            cpu: "200m"