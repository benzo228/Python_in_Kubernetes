apiVersion: apps/v1
kind: Deployment
metadata:
  name: task-manager
  namespace: pet-project
  labels:
    app: task-manager
spec:
  replicas: 2
  selector:
    matchLabels:
      app: task-manager
  template:
    metadata:
      labels:
        app: task-manager
    spec:
      serviceAccountName: task-manager-sa   # привязываем сервис-аккаунт с правами
      containers:
      - name: app
        image: task-manager:v6
        imagePullPolicy: IfNotPresent
        ports:
        - containerPort: 8000
        envFrom:
        - configMapRef:
            name: task-manager-config
        resources:
          requests:
            memory: "128Mi"
            cpu: "100m"
          limits:
            memory: "256Mi"
            cpu: "200m"
